name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_UPDATE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/downloads

jobs:
  create-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release shell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi

  build-macos:
    name: Build macOS Release
    runs-on: macos-14
    needs: create-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS release
        run: pnpm run make:release

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(out/make/zip/darwin/arm64/*)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

      - name: Package macOS updater feed
        run: |
          mkdir -p pages/downloads/darwin/arm64
          cp -R out/make/zip/darwin/arm64/. pages/downloads/darwin/arm64/

      - name: Upload macOS Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-macos
          path: pages

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    needs: create-release
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows release
        run: pnpm run make:release

      - name: Upload Windows release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(out/make/squirrel.windows/x64/*)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

      - name: Package Windows updater feed
        run: |
          mkdir -p pages/downloads/win32/x64
          cp -R out/make/squirrel.windows/x64/. pages/downloads/win32/x64/

      - name: Upload Windows Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-windows
          path: pages

  deploy-pages:
    name: Deploy Updater Feed
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download macOS Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-macos
          path: artifacts/macos

      - name: Download Windows Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-windows
          path: artifacts/windows

      - name: Merge updater feed
        run: |
          mkdir -p pages
          cp -R artifacts/macos/. pages/
          cp -R artifacts/windows/. pages/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
